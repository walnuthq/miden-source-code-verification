server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation — required by the Miden SDK (SharedArrayBuffer /
    # WASM threads), the production equivalent of midenVitePlugin's dev headers.
    # `always` applies them to every response, including the SPA fallback and
    # errors. The .wasm MIME type comes from nginx's default mime.types
    # (application/wasm). `add_header` does not inherit into a location that sets
    # its own headers, so each location repeats the COOP/COEP pair.
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy require-corp always;

    # Content-hashed build assets are immutable — cache aggressively.
    location /assets/ {
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback: serve the HTML shell for client-side routes. Never cache it,
    # so new deployments are picked up immediately.
    location / {
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
