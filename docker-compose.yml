services:
  api-compile:
    build:
      context: apps/api-compile
      dockerfile: Dockerfile
    image: miden-sourcify-api-compile
    container_name: miden-sourcify-api-compile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
