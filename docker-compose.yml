services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    volumes:
      - miden-sourcify-postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=miden-sourcify
      - POSTGRES_PASSWORD=miden_sourcify_dev_password
      - POSTGRES_DB=miden-sourcify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miden-sourcify -d miden-sourcify"]
      interval: 5s
      timeout: 5s
      retries: 5
  api-compile:
    build:
      context: apps/api-compile
    env_file: apps/api-compile/.env
    image: miden-sourcify-api-compile
    container_name: miden-sourcify-api-compile
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

volumes:
  miden-sourcify-postgres:
